name: scam_prevention_app
description: "A dual-role Scam Prevention App for vulnerable users and their guardians."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Firebase Core & Services
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_messaging: ^14.7.15
  google_sign_in: ^6.2.1
  
  # Localization
  easy_localization: ^3.0.3
  
  # UI, Navigation, and Utilities
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  go_router: ^13.2.0
  flutter_svg: ^2.0.10
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
